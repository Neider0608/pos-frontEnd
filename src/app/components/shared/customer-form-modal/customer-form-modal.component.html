<p-dialog [visible]="visible" (visibleChange)="onVisibleChange($event)" [modal]="true" [closable]="true" [draggable]="false" [resizable]="false" [style]="{ width: '650px' }" styleClass="!rounded-[1.5rem] !border-none !shadow-2xl" [showHeader]="true">
    <ng-template pTemplate="header">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-600 flex items-center justify-center text-white shadow-lg shadow-emerald-200">
                <i class="pi pi-user-plus text-xl"></i>
            </div>
            <div>
                <h3 class="text-lg font-black text-slate-800 dark:text-white uppercase tracking-tight">Nuevo Cliente</h3>
                <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Registro de cliente</p>
            </div>
        </div>
    </ng-template>

    <div class="space-y-5 pt-2 max-h-[60vh] overflow-y-auto pr-2 custom-scrollbar">
        @if (!formData.isCompany) {
            <div class="bg-emerald-50/50 dark:bg-emerald-900/10 p-4 rounded-2xl border border-emerald-100 dark:border-emerald-800/50">
                <h4 class="text-[10px] font-black text-emerald-600 dark:text-emerald-400 uppercase tracking-widest mb-3">Datos Personales</h4>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Primer Nombre *</label>
                        <input pInputText [(ngModel)]="formData.firstName" placeholder="Nombre" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm transition-all" />
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Segundo Nombre</label>
                        <input pInputText [(ngModel)]="formData.middleName" placeholder="Opcional" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm" />
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Primer Apellido *</label>
                        <input pInputText [(ngModel)]="formData.lastName" placeholder="Apellido" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm transition-all" />
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1.5">Segundo Apellido</label>
                        <input pInputText [(ngModel)]="formData.secondLastName" placeholder="Opcional" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm" />
                    </div>
                </div>
            </div>
        } @else {
            <div class="bg-indigo-50/50 dark:bg-indigo-900/10 p-4 rounded-2xl border border-indigo-100 dark:border-indigo-800/50">
                <h4 class="text-[10px] font-black text-indigo-600 dark:text-indigo-400 uppercase tracking-widest mb-3">Datos de la Empresa</h4>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Razon Social *</label>
                        <input pInputText [(ngModel)]="formData.businessName" placeholder="Nombre de la empresa" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm transition-all" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">NIT *</label>
                            <input pInputText [(ngModel)]="formData.nit" placeholder="NIT sin digito de verificacion" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm transition-all" />
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">DV</label>
                            <input pInputText placeholder="-" disabled class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-slate-100 dark:!bg-slate-700 !py-2.5 !text-sm" />
                        </div>
                    </div>
                </div>
            </div>
        }

        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
            <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Identificacion</h4>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Tipo de ID</label>
                    <p-dropdown
                        [options]="identificationTypes"
                        [(ngModel)]="formData.identificationTypeId"
                        optionLabel="label"
                        optionValue="value"
                        styleClass="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800"
                    ></p-dropdown>
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Numero de Documento *</label>
                    <input pInputText [(ngModel)]="formData.document" placeholder="Numero de identificacion" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm transition-all" />
                </div>
            </div>
        </div>

        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl">
            <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3">Contacto</h4>
            <div class="space-y-4">
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Correo Electronico *</label>
                    <input pInputText [(ngModel)]="formData.email" type="email" placeholder="cliente@correo.com" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm transition-all" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Telefono</label>
                        <input pInputText [(ngModel)]="formData.phone" placeholder="300 123 4567" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm" />
                    </div>
                    <div>
                        <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Ciudad</label>
                        <input pInputText [(ngModel)]="formData.city" placeholder="Ciudad" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm" />
                    </div>
                </div>
                <div>
                    <label class="block text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Direccion</label>
                    <input pInputText [(ngModel)]="formData.address" placeholder="Direccion de residencia" class="w-full !rounded-xl !border-slate-200 dark:!border-slate-700 !bg-white dark:!bg-slate-800 !py-2.5 !text-sm" />
                </div>
            </div>
        </div>

        <div class="flex items-center justify-between p-4 bg-amber-50/50 dark:bg-amber-900/10 rounded-2xl border border-amber-100 dark:border-amber-800/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center shadow-sm">
                    <i class="pi pi-building text-amber-500"></i>
                </div>
                <div>
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-200">Es una empresa?</span>
                    <p class="text-[9px] text-slate-400">Active si el cliente es una empresa</p>
                </div>
            </div>
            <p-inputSwitch [(ngModel)]="formData.isCompany"></p-inputSwitch>
        </div>
    </div>

    <ng-template pTemplate="footer">
        <div class="flex justify-end gap-3 pt-4 border-t border-slate-100 dark:border-slate-800">
            <button pButton label="Cancelar" class="p-button-text !text-slate-400 !font-bold" (click)="close()"></button>
            <button pButton label="Guardar Cliente" icon="pi pi-check" (click)="save()" [disabled]="!isValid()" class="!bg-emerald-500 !border-emerald-500 hover:!bg-emerald-600 !font-bold !rounded-xl"></button>
        </div>
    </ng-template>
</p-dialog>
